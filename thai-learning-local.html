<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 לומדים תאילנדית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:linear-gradient(170deg,#0a0a1a,#0d1117 50%,#0a0a1a);color:#e0e0e0;min-height:100vh;direction:rtl}
.thai{font-family:'Noto Sans Thai',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
#app{max-width:520px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0 12px;animation:fadeUp .5s ease}
.title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#F9A826,#FF6B35,#FF6F91);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:#666;margin-top:4px}
.pbar{width:120px;height:8px;border-radius:99px;background:#ffffff11;margin:10px auto 0;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#F9A826,#FF6B35);transition:width .7s}
.ptxt{font-size:11px;color:#555;margin-top:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;animation:fadeUp .5s ease .1s forwards;opacity:0}
.card{border-radius:16px;padding:18px;text-align:right;cursor:pointer;transition:all .3s;border:2px solid transparent}
.card:hover{transform:scale(1.03)}.card:active{transform:scale(.98)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-icon{font-size:26px}.card-cnt{font-size:12px;opacity:.6}
.card-name{font-size:16px;font-weight:700;margin-bottom:10px}
.card-bar{width:100%;height:7px;border-radius:99px;overflow:hidden}
.card-fill{height:100%;border-radius:99px;transition:width .5s}
.card-pct{font-size:10px;opacity:.5;margin-top:3px}
.inner-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0}
.back{font-size:22px;opacity:.6;cursor:pointer;background:none;border:none;color:#e0e0e0}
.back:hover{opacity:1}
.inner-t{display:flex;align-items:center;gap:8px}
.inner-t h2{font-size:19px;font-weight:700}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.tab{padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #ffffff11;background:transparent;color:#666;transition:all .2s}
.wlist{display:flex;flex-direction:column;gap:8px}
.witem{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:12px;animation:fadeUp .4s ease forwards;opacity:0}
.wleft{display:flex;align-items:center;gap:8px}
.wthai{font-size:21px;font-weight:700}
.wphon{font-size:11px;color:#888}
.wheb{font-weight:500;color:#ccc;font-size:14px}
.spk{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid;transition:all .2s;flex-shrink:0;background:transparent;font-size:15px}
.spk:hover{transform:scale(1.1)}.spk:active{transform:scale(.95)}
.spk.big{width:44px;height:44px;font-size:19px}
.spk.active{animation:pulse .8s ease infinite}
.fc{display:flex;flex-direction:column;align-items:center;gap:16px}
.fccard{width:280px;min-height:240px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;cursor:pointer;transition:all .5s;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.fcbtns{display:flex;gap:10px;animation:fadeUp .3s ease}
.fcb{padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid}
.fcb:hover{transform:scale(1.05)}
.fcb.yes{background:#51cf6622;color:#51cf66;border-color:#51cf6633}
.fcb.no{background:#ff4d4d22;color:#ff6b6b;border-color:#ff4d4d33}
.qdots{display:flex;gap:5px;justify-content:center;margin-bottom:8px}
.qdot{width:11px;height:11px;border-radius:50%}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.qopt{padding:14px;border-radius:12px;text-align:center;font-weight:700;cursor:pointer;color:#fff;transition:all .2s;border:2px solid}
.voice-status{font-size:11px;color:#F9A826;text-align:center;margin-top:6px;min-height:16px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== DATA =====
const CATEGORIES = [
  { id:"supermarket",name:"סופרמרקט",icon:"🛒",color:"#FF6B35",words:[
    {thai:"น้ำ",phonetic:"náam",hebrew:"מים"},{thai:"ข้าว",phonetic:"kâao",hebrew:"אורז"},
    {thai:"ไข่",phonetic:"kài",hebrew:"ביצה"},{thai:"ผัก",phonetic:"phàk",hebrew:"ירקות"},
    {thai:"ผลไม้",phonetic:"phǒn-la-máai",hebrew:"פירות"},{thai:"เนื้อ",phonetic:"néuua",hebrew:"בשר"},
    {thai:"ปลา",phonetic:"bplaa",hebrew:"דג"},{thai:"นม",phonetic:"nom",hebrew:"חלב"},
    {thai:"ขนมปัง",phonetic:"kha-nǒm-bpang",hebrew:"לחם"},{thai:"เท่าไหร่",phonetic:"tâo-rài",hebrew:"כמה זה עולה?"},
    {thai:"ถุง",phonetic:"thǔng",hebrew:"שקית"},{thai:"แพง",phonetic:"phaeng",hebrew:"יקר"},
    {thai:"ถูก",phonetic:"thùuk",hebrew:"זול"}
  ]},
  { id:"hotel",name:"בית מלון",icon:"🏨",color:"#4ECDC4",words:[
    {thai:"ห้อง",phonetic:"hông",hebrew:"חדר"},{thai:"กุญแจ",phonetic:"gun-jae",hebrew:"מפתח"},
    {thai:"เช็คอิน",phonetic:"chék-in",hebrew:"צ'ק אין"},{thai:"เช็คเอาท์",phonetic:"chék-áo",hebrew:"צ'ק אאוט"},
    {thai:"ผ้าเช็ดตัว",phonetic:"phâa-chét-dtua",hebrew:"מגבת"},{thai:"แอร์",phonetic:"ae",hebrew:"מזגן"},
    {thai:"อาหารเช้า",phonetic:"aa-hǎan-cháo",hebrew:"ארוחת בוקר"},{thai:"ว่างไหม",phonetic:"wâang-mái",hebrew:"יש פנוי?"},
    {thai:"คืน",phonetic:"kheun",hebrew:"לילה (לינה)"},{thai:"สระว่ายน้ำ",phonetic:"sà-wâai-náam",hebrew:"בריכה"},
    {thai:"ลิฟต์",phonetic:"líp",hebrew:"מעלית"}
  ]},
  { id:"market",name:"שוק",icon:"🏪",color:"#FF6F91",words:[
    {thai:"อร่อย",phonetic:"a-ròi",hebrew:"טעים"},{thai:"เผ็ด",phonetic:"phèt",hebrew:"חריף"},
    {thai:"ไม่เผ็ด",phonetic:"mâi-phèt",hebrew:"לא חריף"},{thai:"หวาน",phonetic:"wǎan",hebrew:"מתוק"},
    {thai:"เปรี้ยว",phonetic:"bprîiao",hebrew:"חמוץ"},{thai:"ลดได้ไหม",phonetic:"lót-dâai-mái",hebrew:"אפשר הנחה?"},
    {thai:"อันนี้",phonetic:"an-née",hebrew:"את זה"},{thai:"เอาอันนี้",phonetic:"ao-an-née",hebrew:"אקח את זה"},
    {thai:"ใส่ถุง",phonetic:"sài-thǔng",hebrew:"לשים בשקית"},{thai:"จ่ายเงิน",phonetic:"jàai-ngoen",hebrew:"לשלם"},
    {thai:"ขอบคุณ",phonetic:"khòp-khun",hebrew:"תודה"}
  ]},
  { id:"partner",name:"שיחה עם בת זוג",icon:"💕",color:"#C06C84",words:[
    {thai:"สวัสดี",phonetic:"sa-wàt-dee",hebrew:"שלום"},{thai:"รัก",phonetic:"rák",hebrew:"אהבה"},
    {thai:"คิดถึง",phonetic:"khít-thǔeng",hebrew:"מתגעגע"},{thai:"หิวไหม",phonetic:"hǐu-mái",hebrew:"את רעבה?"},
    {thai:"ไปไหน",phonetic:"bpai-nǎi",hebrew:"לאן נלך?"},{thai:"สบายดี",phonetic:"sa-baai-dee",hebrew:"מה שלומך"},
    {thai:"เหนื่อย",phonetic:"nèuuai",hebrew:"עייף/ה"},{thai:"น่ารัก",phonetic:"nâa-rák",hebrew:"חמוד/ה"},
    {thai:"กินข้าว",phonetic:"gin-kâao",hebrew:"לאכול"},{thai:"ง่วงนอน",phonetic:"ngûuang-noon",hebrew:"מנומנם/ת"},
    {thai:"ไม่เป็นไร",phonetic:"mâi-bpen-rai",hebrew:"לא נורא"},{thai:"ช่วยด้วย",phonetic:"chûuai-dûuai",hebrew:"עזרה!"}
  ]},
  { id:"transport",name:"תחבורה",icon:"🛺",color:"#845EC2",words:[
    {thai:"ไปที่",phonetic:"bpai-thîi",hebrew:"ללכת ל..."},{thai:"หยุด",phonetic:"yùt",hebrew:"עצור"},
    {thai:"ตรงไป",phonetic:"dtrong-bpai",hebrew:"ישר קדימה"},{thai:"เลี้ยวซ้าย",phonetic:"líiao-sáai",hebrew:"שמאלה"},
    {thai:"เลี้ยวขวา",phonetic:"líiao-khwǎa",hebrew:"ימינה"},{thai:"ใกล้",phonetic:"glâi",hebrew:"קרוב"},
    {thai:"ไกล",phonetic:"glai",hebrew:"רחוק"},{thai:"จอดที่นี่",phonetic:"jòt-thîi-nîi",hebrew:"עצור כאן"},
    {thai:"สนามบิน",phonetic:"sa-nǎam-bin",hebrew:"שדה תעופה"},{thai:"สถานี",phonetic:"sa-thǎa-nii",hebrew:"תחנה"}
  ]},
  { id:"basics",name:"ביטויים בסיסיים",icon:"🙏",color:"#F9A826",words:[
    {thai:"ครับ",phonetic:"khráp",hebrew:"מילת נימוס (ז)"},{thai:"ค่ะ",phonetic:"khâ",hebrew:"מילת נימוס (נ)"},
    {thai:"ใช่",phonetic:"châi",hebrew:"כן"},{thai:"ไม่ใช่",phonetic:"mâi-châi",hebrew:"לא"},
    {thai:"ไม่เข้าใจ",phonetic:"mâi-khâo-jai",hebrew:"לא מבין"},{thai:"พูดอีกที",phonetic:"phûut-ìik-thii",hebrew:"תגיד שוב"},
    {thai:"ห้องน้ำ",phonetic:"hông-náam",hebrew:"שירותים"},{thai:"ร้อน",phonetic:"rón",hebrew:"חם"},
    {thai:"เย็น",phonetic:"yen",hebrew:"קר"},{thai:"สวย",phonetic:"sǔuai",hebrew:"יפה"},
    {thai:"ดี",phonetic:"dee",hebrew:"טוב"},{thai:"ไม่ดี",phonetic:"mâi-dee",hebrew:"לא טוב"}
  ]}
];

// ===== SPEECH ENGINE =====
let thaiVoice = null;
let hasTTS = typeof speechSynthesis !== 'undefined';
let voiceStatus = hasTTS ? "טוען קולות..." : "⚠️ הורד את הקובץ ופתח ב-Chrome כדי לשמוע קול אמיתי";

function initVoices() {
  if (!hasTTS) return;
  const voices = speechSynthesis.getVoices();
  thaiVoice = voices.find(v => v.lang.startsWith('th') && /male|niwat/i.test(v.name))
    || voices.find(v => v.lang.startsWith('th'))
    || null;
  if (thaiVoice) {
    voiceStatus = "✅ קול תאילנדי: " + thaiVoice.name;
  } else if (voices.length > 0) {
    voiceStatus = "⚠️ לא נמצא קול תאילנדי. התקן בהגדרות המכשיר";
  }
  render();
}

if (hasTTS) {
  speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}

let speakingWord = null;

function speakThai(text) {
  if (!hasTTS) { alert("פתח את הקובץ ישירות בדפדפן Chrome כדי לשמוע הגייה אמיתית"); return; }
  speechSynthesis.cancel();
  const clean = text.replace(/\//g, ' ');
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'th-TH';
  if (thaiVoice) utt.voice = thaiVoice;
  utt.rate = 0.75;
  utt.pitch = 0.85;
  utt.volume = 1;
  speakingWord = text;
  render();
  utt.onend = () => { speakingWord = null; render(); };
  utt.onerror = () => { speakingWord = null; render(); };
  speechSynthesis.speak(utt);
}

// ===== STATE =====
let state = {
  screen: 'home', // home | category
  catId: null,
  mode: 'browse', // browse | flash | quiz
  flashCards: [],
  flashIndex: 0,
  flipped: false,
  known: {},
  quizQuestions: [],
  quizCurrent: 0,
  quizSelected: null,
  quizScore: 0,
  quizDone: false,
};

function getCat() { return CATEGORIES.find(c => c.id === state.catId); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function getProgress(cat) { const k=cat.words.filter(w=>state.known[cat.id+'-'+w.thai]).length; return {known:k,total:cat.words.length}; }

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'home') app.innerHTML = renderHome();
  else app.innerHTML = renderCategory();
  bindEvents();
}

function renderHome() {
  const totalKnown = Object.keys(state.known).length;
  const totalWords = CATEGORIES.reduce((s,c) => s+c.words.length, 0);
  const pct = totalWords ? (totalKnown/totalWords*100) : 0;
  
  let cards = CATEGORIES.map(cat => {
    const p = getProgress(cat);
    const pp = p.total ? Math.round(p.known/p.total*100) : 0;
    return `<div class="card" data-cat="${cat.id}" style="background:linear-gradient(135deg,${cat.color}22,${cat.color}11);border-color:${cat.color}33">
      <div class="card-top"><span class="card-icon">${cat.icon}</span><span class="card-cnt">${cat.words.length} מילים</span></div>
      <div class="card-name" style="color:${cat.color}">${cat.name}</div>
      <div class="card-bar" style="background:${cat.color}22"><div class="card-fill" style="width:${pp}%;background:${cat.color}"></div></div>
      <div class="card-pct">${pp}% ידוע</div>
    </div>`;
  }).join('');

  return `<div class="header">
    <div class="title">🇹🇭 לומדים תאילנדית</div>
    <div class="sub">אוצר מילים לחיי היומיום • לחץ 🔈 לשמוע הגייה אמיתית</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <span class="ptxt">${totalKnown}/${totalWords}</span>
    </div>
    <div class="voice-status">${voiceStatus}</div>
  </div>
  <div class="grid">${cards}</div>`;
}

function renderCategory() {
  const cat = getCat();
  if (!cat) return '';
  const c = cat.color;
  
  let tabsHtml = ['browse:📖 רשימה','flash:🃏 כרטיסיות','quiz:🧠 חידון'].map(t => {
    const [m,l] = t.split(':');
    const active = state.mode === m;
    return `<button class="tab" data-mode="${m}" style="${active ? `background:${c}33;color:${c};border-color:${c}55` : ''}">${l}</button>`;
  }).join('');

  let content = '';
  if (state.mode === 'browse') content = renderWordList(cat);
  else if (state.mode === 'flash') content = renderFlashcards(cat);
  else if (state.mode === 'quiz') content = renderQuiz(cat);

  return `<div class="inner-hdr">
    <button class="back" data-action="home">→</button>
    <div class="inner-t"><span style="font-size:22px">${cat.icon}</span><h2 style="color:${c}">${cat.name}</h2></div>
    <div style="width:28px"></div>
  </div>
  <div class="tabs">${tabsHtml}</div>
  ${content}`;
}

function renderWordList(cat) {
  const c = cat.color;
  return `<div class="wlist">${cat.words.map((w,i) => {
    const active = speakingWord === w.thai;
    return `<div class="witem" style="background:${c}08;border:1px solid ${c}15;animation-delay:${i*50}ms">
      <div class="wleft">
        <button class="spk ${active?'active':''}" data-speak="${w.thai}" style="border-color:${active?c:c+'33'};background:${active?c+'33':c+'15'}">${active?'🔊':'🔈'}</button>
        <span class="wthai thai">${w.thai}</span>
        <span class="wphon">${w.phonetic}</span>
      </div>
      <span class="wheb">${w.hebrew}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderFlashcards(cat) {
  const c = cat.color;
  const cards = state.flashCards;
  if (!cards.length) return '<div style="text-align:center;color:#666;padding:40px">לוחץ על הכפתור כדי להתחיל</div>';
  const idx = state.flashIndex;
  if (idx >= cards.length) return '<div style="text-align:center;color:#666;padding:40px">סיימת! 🎉</div>';
  const w = cards[idx];
  const fl = state.flipped;
  const active = speakingWord === w.thai;

  let cardInner = '';
  if (!fl) {
    cardInner = `<span class="thai" style="font-size:42px;font-weight:700">${w.thai}</span>
      <div style="display:flex;align-items:center;gap:10px;margin-top:16px">
        <button class="spk big ${active?'active':''}" data-speak="${w.thai}" style="border-color:${active?c:c+'33'};background:${active?c+'33':c+'15'}">${active?'🔊':'🔈'}</button>
        <span style="color:#888;font-size:13px">לחץ לגלות</span>
      </div>`;
  } else {
    cardInner = `<div style="display:flex;align-items:center;gap:10px">
        <span class="thai" style="font-size:30px;font-weight:700">${w.thai}</span>
        <button class="spk big ${active?'active':''}" data-speak="${w.thai}" style="border-color:${active?c:c+'33'};background:${active?c+'33':c+'15'}">${active?'🔊':'🔈'}</button>
      </div>
      <div style="font-size:17px;color:${c};margin-top:8px">${w.phonetic}</div>
      <div style="font-size:20px;font-weight:700;color:#fff;margin-top:8px">${w.hebrew}</div>`;
  }

  let btns = '';
  if (fl) {
    btns = `<div class="fcbtns">
      <button class="fcb no" data-flash="no">עוד לא יודע 🤔</button>
      <button class="fcb yes" data-flash="yes">יודע! ✅</button>
    </div>`;
  }

  return `<div class="fc">
    <div style="font-size:13px;color:#888">${idx+1} / ${cards.length}</div>
    <div class="fccard" data-action="flip" style="background:${fl ? `linear-gradient(145deg,${c}15,${c}08)` : 'linear-gradient(145deg,#1a1a2e,#16213e)'};border:2px solid ${fl?c+'44':'#ffffff15'}">
      ${cardInner}
    </div>
    ${btns}
  </div>`;
}

function renderQuiz(cat) {
  const c = cat.color;
  const qs = state.quizQuestions;
  if (!qs.length) return '';
  
  if (state.quizDone) {
    const pct = Math.round(state.quizScore/qs.length*100);
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
    const msg = pct >= 80 ? 'מצוין! אתה מתקדם יפה!' : pct >= 50 ? 'לא רע, המשך לתרגל!' : 'תמשיך ללמוד!';
    return `<div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-score">${state.quizScore} / ${qs.length}</div>
      <div class="quiz-result-msg">${msg}</div>
      <button class="tab" data-mode="browse" style="margin-top:20px;background:${c}22;color:${c};border-color:${c}44">חזרה לקטגוריה</button>
    </div>`;
  }

  const q = qs[state.quizCurrent];
  const active = speakingWord === q.word.thai;
  const sel = state.quizSelected;

  let dots = qs.map((_,i) => `<div class="qdot" style="background:${i<state.quizCurrent?c:i===state.quizCurrent?'#fff':'#ffffff22'}"></div>`).join('');
  
  let opts = q.options.map(o => {
    let bg = c+'11', bdr = c+'33';
    if (sel !== null) {
      if (o.thai === q.word.thai) { bg='#51cf6633'; bdr='#51cf66'; }
      else if (o.thai === sel) { bg='#ff4d4d33'; bdr='#ff4d4d'; }
    }
    return `<div class="qopt" data-quiz-ans="${o.thai}" style="background:${bg};border-color:${bdr}">${o.hebrew}</div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="qdots">${dots}</div>
    <div class="quiz-prompt">מה התרגום של:</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="thai" style="font-size:40px;font-weight:700">${q.word.thai}</span>
      <button class="spk big ${active?'active':''}" data-speak="${q.word.thai}" style="border-color:${active?c:c+'33'};background:${active?c+'33':c+'15'}">${active?'🔊':'🔈'}</button>
    </div>
    <div style="font-size:13px;color:#888">${q.word.phonetic}</div>
    <div class="qopts">${opts}</div>
  </div>`;
}

// ===== EVENTS =====
function bindEvents() {
  // Category cards
  document.querySelectorAll('[data-cat]').forEach(el => {
    el.onclick = () => { state.screen='category'; state.catId=el.dataset.cat; state.mode='browse'; render(); };
  });
  // Back
  document.querySelectorAll('[data-action="home"]').forEach(el => {
    el.onclick = () => { state.screen='home'; render(); };
  });
  // Tabs
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.onclick = () => {
      const m = el.dataset.mode;
      state.mode = m;
      if (m === 'flash') {
        const cat = getCat();
        state.flashCards = shuffle(cat.words);
        state.flashIndex = 0;
        state.flipped = false;
      }
      if (m === 'quiz') {
        const cat = getCat();
        const shuffled = shuffle(cat.words).slice(0, Math.min(8, cat.words.length));
        state.quizQuestions = shuffled.map(w => ({
          word: w,
          options: shuffle([w, ...shuffle(cat.words.filter(x=>x.thai!==w.thai)).slice(0,3)])
        }));
        state.quizCurrent = 0; state.quizSelected = null; state.quizScore = 0; state.quizDone = false;
      }
      render();
    };
  });
  // Speak buttons
  document.querySelectorAll('[data-speak]').forEach(el => {
    el.onclick = (e) => { e.stopPropagation(); speakThai(el.dataset.speak); };
  });
  // Flashcard flip
  document.querySelectorAll('[data-action="flip"]').forEach(el => {
    el.onclick = () => { state.flipped = !state.flipped; render(); };
  });
  // Flashcard know/don't
  document.querySelectorAll('[data-flash]').forEach(el => {
    el.onclick = () => {
      const cat = getCat();
      const w = state.flashCards[state.flashIndex];
      if (el.dataset.flash === 'yes') {
        state.known[cat.id+'-'+w.thai] = true;
      } else {
        delete state.known[cat.id+'-'+w.thai];
      }
      state.flashIndex++;
      state.flipped = false;
      if (state.flashIndex >= state.flashCards.length) state.mode = 'browse';
      render();
    };
  });
  // Quiz answers
  document.querySelectorAll('[data-quiz-ans]').forEach(el => {
    el.onclick = () => {
      if (state.quizSelected !== null) return;
      const ans = el.dataset.quizAns;
      state.quizSelected = ans;
      if (ans === state.quizQuestions[state.quizCurrent].word.thai) state.quizScore++;
      render();
      setTimeout(() => {
        if (state.quizCurrent + 1 >= state.quizQuestions.length) {
          state.quizDone = true;
        } else {
          state.quizCurrent++;
          state.quizSelected = null;
        }
        render();
      }, 1200);
    };
  });
}

// ===== START =====
render();
</script>
</body>
</html>
