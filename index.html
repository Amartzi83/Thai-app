<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>לומדים תאילנדית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:#0d1117;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.thai{font-family:'Noto Sans Thai',sans-serif}
.hide{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(249,168,38,0.4)}50%{box-shadow:0 0 12px 4px rgba(249,168,38,0.2)}}

/* LAYOUT */
.app{max-width:500px;margin:0 auto;padding:16px}

/* HEADER */
.hdr{text-align:center;padding:16px 0 8px}
.hdr h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,#F9A826,#FF6B35,#FF6F91);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:12px;color:#666;margin-top:4px}
.prog-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.prog-bar{width:100px;height:6px;border-radius:99px;background:#ffffff11;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#F9A826,#FF6B35);transition:width .5s}
.prog-txt{font-size:10px;color:#555}
.voice-info{font-size:11px;margin-top:6px;min-height:16px}

/* CATEGORY GRID */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;animation:fadeIn .4s ease}
.cat{border-radius:14px;padding:16px;text-align:right;cursor:pointer;transition:transform .2s;border:2px solid transparent;-webkit-user-select:none}
.cat:active{transform:scale(.97)}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cat-icon{font-size:24px}
.cat-cnt{font-size:11px;opacity:.5}
.cat-name{font-size:15px;font-weight:700;margin-bottom:8px}
.cat-bar{width:100%;height:6px;border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.cat-pct{font-size:10px;opacity:.4;margin-top:2px}

/* INNER PAGE */
.inner-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.back-btn{font-size:20px;opacity:.5;cursor:pointer;background:none;border:none;color:#e0e0e0;padding:8px}
.inner-title{display:flex;align-items:center;gap:6px}
.inner-title h2{font-size:18px;font-weight:700}

/* TABS */
.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.tab{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #ffffff11;background:transparent;color:#555;transition:all .2s}
.tab.on{border-color:currentColor}

/* SPEAKER BUTTON */
.spk{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid;transition:all .15s;flex-shrink:0;background:transparent;font-size:14px;-webkit-user-select:none}
.spk:active{transform:scale(.9)}
.spk.lg{width:42px;height:42px;font-size:18px}
.spk.on{animation:pulseGlow 1s ease infinite}

/* WORD LIST */
.wlist{display:flex;flex-direction:column;gap:6px;animation:fadeIn .3s ease}
.witem{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:10px}
.wleft{display:flex;align-items:center;gap:6px;min-width:0}
.wthai{font-size:20px;font-weight:700;white-space:nowrap}
.wphon{font-size:10px;color:#777;white-space:nowrap}
.wheb{font-weight:500;color:#bbb;font-size:13px;text-align:left;flex-shrink:0}

/* FLASHCARD */
.fc{display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeIn .3s ease}
.fc-count{font-size:12px;color:#777}
.fc-card{width:270px;min-height:220px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;cursor:pointer;transition:all .3s;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.fc-card:active{transform:scale(.98)}
.fc-thai{font-size:40px;font-weight:700}
.fc-hint{color:#777;font-size:12px;margin-top:12px}
.fc-phon{font-size:16px;margin-top:6px}
.fc-heb{font-size:19px;font-weight:700;color:#fff;margin-top:6px}
.fc-btns{display:flex;gap:8px;animation:fadeIn .25s ease}
.fc-btn{padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid}
.fc-btn:active{transform:scale(.95)}
.fc-btn.yes{background:#51cf6622;color:#51cf66;border-color:#51cf6633}
.fc-btn.no{background:#ff4d4d22;color:#ff6b6b;border-color:#ff4d4d33}

/* QUIZ */
.quiz{display:flex;flex-direction:column;align-items:center;gap:12px;animation:fadeIn .3s ease}
.q-dots{display:flex;gap:4px}
.q-dot{width:10px;height:10px;border-radius:50%}
.q-prompt{color:#888;font-size:12px}
.q-thai{font-size:38px;font-weight:700}
.q-phon{font-size:12px;color:#777}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:360px;margin-top:4px}
.q-opt{padding:12px;border-radius:10px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;color:#fff;transition:all .15s;border:2px solid}
.q-opt:active{transform:scale(.97)}
.q-result{text-align:center;padding:30px 0;animation:fadeIn .4s ease}
.q-result-emoji{font-size:56px;margin-bottom:6px}
.q-result-score{font-size:22px;font-weight:700;color:#fff}
.q-result-msg{color:#888;font-size:14px;margin-top:6px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <h1>🇹🇭 לומדים תאילנדית</h1>
    <p>לחץ 🔈 לשמוע הגייה אמיתית בתאילנדית</p>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="mainProgress" style="width:0%"></div></div>
      <span class="prog-txt" id="mainCount">0/0</span>
    </div>
    <div class="voice-info" id="voiceInfo"></div>
  </div>
  <div id="content"></div>
</div>

<script>
// ===== DATA =====
var DATA=[
{id:"supermarket",name:"סופרמרקט",icon:"🛒",color:"#FF6B35",words:[
{t:"น้ำ",p:"náam",h:"מים"},{t:"ข้าว",p:"kâao",h:"אורז"},{t:"ไข่",p:"kài",h:"ביצה"},
{t:"ผัก",p:"phàk",h:"ירקות"},{t:"ผลไม้",p:"phǒn-la-máai",h:"פירות"},{t:"เนื้อ",p:"néuua",h:"בשר"},
{t:"ปลา",p:"bplaa",h:"דג"},{t:"นม",p:"nom",h:"חלב"},{t:"ขนมปัง",p:"kha-nǒm-bpang",h:"לחם"},
{t:"เท่าไหร่",p:"tâo-rài",h:"כמה עולה?"},{t:"ถุง",p:"thǔng",h:"שקית"},
{t:"แพง",p:"phaeng",h:"יקר"},{t:"ถูก",p:"thùuk",h:"זול"}]},
{id:"hotel",name:"בית מלון",icon:"🏨",color:"#4ECDC4",words:[
{t:"ห้อง",p:"hông",h:"חדר"},{t:"กุญแจ",p:"gun-jae",h:"מפתח"},
{t:"เช็คอิน",p:"chék-in",h:"צ'ק אין"},{t:"เช็คเอาท์",p:"chék-áo",h:"צ'ק אאוט"},
{t:"ผ้าเช็ดตัว",p:"phâa-chét-dtua",h:"מגבת"},{t:"แอร์",p:"ae",h:"מזגן"},
{t:"อาหารเช้า",p:"aa-hǎan-cháo",h:"ארוחת בוקר"},{t:"ว่างไหม",p:"wâang-mái",h:"יש פנוי?"},
{t:"คืน",p:"kheun",h:"לילה"},{t:"สระว่ายน้ำ",p:"sà-wâai-náam",h:"בריכה"}]},
{id:"market",name:"שוק",icon:"🏪",color:"#FF6F91",words:[
{t:"อร่อย",p:"a-ròi",h:"טעים"},{t:"เผ็ด",p:"phèt",h:"חריף"},
{t:"ไม่เผ็ด",p:"mâi-phèt",h:"לא חריף"},{t:"หวาน",p:"wǎan",h:"מתוק"},
{t:"ลดได้ไหม",p:"lót-dâai-mái",h:"אפשר הנחה?"},{t:"อันนี้",p:"an-née",h:"את זה"},
{t:"เอาอันนี้",p:"ao-an-née",h:"אקח את זה"},{t:"ใส่ถุง",p:"sài-thǔng",h:"שים בשקית"},
{t:"จ่ายเงิน",p:"jàai-ngoen",h:"לשלם"},{t:"ขอบคุณ",p:"khòp-khun",h:"תודה"}]},
{id:"partner",name:"בת זוג",icon:"💕",color:"#C06C84",words:[
{t:"สวัสดี",p:"sa-wàt-dee",h:"שלום"},{t:"รัก",p:"rák",h:"אהבה"},
{t:"คิดถึง",p:"khít-thǔeng",h:"מתגעגע"},{t:"หิวไหม",p:"hǐu-mái",h:"את רעבה?"},
{t:"ไปไหน",p:"bpai-nǎi",h:"לאן נלך?"},{t:"สบายดี",p:"sa-baai-dee",h:"מה שלומך"},
{t:"น่ารัก",p:"nâa-rák",h:"חמוד/ה"},{t:"กินข้าว",p:"gin-kâao",h:"לאכול"},
{t:"ไม่เป็นไร",p:"mâi-bpen-rai",h:"לא נורא"},{t:"ช่วยด้วย",p:"chûuai-dûuai",h:"עזרה!"}]},
{id:"transport",name:"תחבורה",icon:"🛺",color:"#845EC2",words:[
{t:"ไปที่",p:"bpai-thîi",h:"ללכת ל..."},{t:"หยุด",p:"yùt",h:"עצור"},
{t:"ตรงไป",p:"dtrong-bpai",h:"ישר"},{t:"เลี้ยวซ้าย",p:"líiao-sáai",h:"שמאלה"},
{t:"เลี้ยวขวา",p:"líiao-khwǎa",h:"ימינה"},{t:"ใกล้",p:"glâi",h:"קרוב"},
{t:"ไกล",p:"glai",h:"רחוק"},{t:"จอดที่นี่",p:"jòt-thîi-nîi",h:"עצור כאן"},
{t:"สนามบิน",p:"sa-nǎam-bin",h:"שדה תעופה"},{t:"สถานี",p:"sa-thǎa-nii",h:"תחנה"}]},
{id:"basics",name:"ביטויים בסיסיים",icon:"🙏",color:"#F9A826",words:[
{t:"ครับ",p:"khráp",h:"נימוס (ז)"},{t:"ค่ะ",p:"khâ",h:"נימוס (נ)"},
{t:"ใช่",p:"châi",h:"כן"},{t:"ไม่ใช่",p:"mâi-châi",h:"לא"},
{t:"ไม่เข้าใจ",p:"mâi-khâo-jai",h:"לא מבין"},{t:"พูดอีกที",p:"phûut-ìik-thii",h:"תגיד שוב"},
{t:"ห้องน้ำ",p:"hông-náam",h:"שירותים"},{t:"ร้อน",p:"rón",h:"חם"},
{t:"เย็น",p:"yen",h:"קר"},{t:"ดี",p:"dee",h:"טוב"},{t:"ไม่ดี",p:"mâi-dee",h:"לא טוב"}]}
];

// ===== TTS =====
var ttsOk=false,thaiVoice=null,nowSpeaking=null;
try{
  if(window.speechSynthesis){
    ttsOk=true;
    function loadVoices(){
      var v=speechSynthesis.getVoices();
      thaiVoice=null;
      for(var i=0;i<v.length;i++){if(v[i].lang.indexOf('th')===0){thaiVoice=v[i];break;}}
      var el=document.getElementById('voiceInfo');
      if(el){
        if(thaiVoice) el.innerHTML='<span style="color:#51cf66">✅ '+thaiVoice.name+'</span>';
        else if(v.length>0) el.innerHTML='<span style="color:#F9A826">⚠️ התקן קול תאילנדי בהגדרות המכשיר</span>';
      }
    }
    speechSynthesis.onvoiceschanged=loadVoices;
    loadVoices();
  }
}catch(e){ttsOk=false;}

function speak(txt){
  if(!ttsOk){alert('פתח בדפדפן Chrome עם קול תאילנדי מותקן');return;}
  try{speechSynthesis.cancel();}catch(e){}
  var u=new SpeechSynthesisUtterance(txt.replace(/\//g,' '));
  u.lang='th-TH';
  if(thaiVoice)u.voice=thaiVoice;
  u.rate=0.75;u.pitch=0.85;
  nowSpeaking=txt;
  updateSpeakers();
  u.onend=u.onerror=function(){nowSpeaking=null;updateSpeakers();};
  speechSynthesis.speak(u);
}

function updateSpeakers(){
  var btns=document.querySelectorAll('.spk[data-th]');
  for(var i=0;i<btns.length;i++){
    var b=btns[i];
    if(b.dataset.th===nowSpeaking){b.classList.add('on');b.textContent='🔊';}
    else{b.classList.remove('on');b.textContent='🔈';}
  }
}

// ===== STATE =====
var S={screen:'home',catIdx:-1,mode:'list',known:{},fc:[],fi:0,flip:false,qq:[],qi:0,qa:null,qs:0,qd:false};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function kKey(cat,w){return cat.id+':'+w.t;}

// ===== RENDER =====
function render(){
  var c=document.getElementById('content');
  // progress
  var total=0,known=0;
  DATA.forEach(function(cat){cat.words.forEach(function(w){total++;if(S.known[kKey(cat,w)])known++;});});
  document.getElementById('mainProgress').style.width=(total?known/total*100:0)+'%';
  document.getElementById('mainCount').textContent=known+'/'+total;

  if(S.screen==='home'){
    document.querySelector('.hdr').classList.remove('hide');
    c.innerHTML=renderHome();
  }else{
    document.querySelector('.hdr').classList.add('hide');
    c.innerHTML=renderInner();
  }
  bindAll();
}

function renderHome(){
  var html='<div class="cats">';
  DATA.forEach(function(cat,i){
    var kn=0;cat.words.forEach(function(w){if(S.known[kKey(cat,w)])kn++;});
    var pct=cat.words.length?Math.round(kn/cat.words.length*100):0;
    html+='<div class="cat" data-ci="'+i+'" style="background:linear-gradient(135deg,'+cat.color+'22,'+cat.color+'11);border-color:'+cat.color+'33">';
    html+='<div class="cat-top"><span class="cat-icon">'+cat.icon+'</span><span class="cat-cnt">'+cat.words.length+' מילים</span></div>';
    html+='<div class="cat-name" style="color:'+cat.color+'">'+cat.name+'</div>';
    html+='<div class="cat-bar" style="background:'+cat.color+'22"><div class="cat-bar-fill" style="width:'+pct+'%;background:'+cat.color+'"></div></div>';
    html+='<div class="cat-pct">'+pct+'%</div></div>';
  });
  return html+'</div>';
}

function renderInner(){
  var cat=DATA[S.catIdx],c=cat.color;
  var html='<div class="inner-hdr"><button class="back-btn" id="goBack">→</button>';
  html+='<div class="inner-title"><span style="font-size:20px">'+cat.icon+'</span><h2 style="color:'+c+'">'+cat.name+'</h2></div>';
  html+='<div style="width:36px"></div></div>';
  
  html+='<div class="tabs">';
  [{m:'list',l:'📖 רשימה'},{m:'flash',l:'🃏 כרטיסיות'},{m:'quiz',l:'🧠 חידון'}].forEach(function(t){
    var on=S.mode===t.m;
    html+='<button class="tab'+(on?' on':'')+'" data-mode="'+t.m+'" style="'+(on?'background:'+c+'33;color:'+c+';border-color:'+c+'55':'')+'"">'+t.l+'</button>';
  });
  html+='</div>';

  if(S.mode==='list') html+=renderList(cat);
  else if(S.mode==='flash') html+=renderFlash(cat);
  else if(S.mode==='quiz') html+=renderQuiz(cat);
  return html;
}

function spkBtn(thai,c,big){
  var on=nowSpeaking===thai;
  var cls='spk'+(big?' lg':'')+(on?' on':'');
  return '<button class="'+cls+'" data-th="'+thai+'" style="border-color:'+(on?c:c+'33')+';background:'+(on?c+'33':c+'15')+'">'+(on?'🔊':'🔈')+'</button>';
}

function renderList(cat){
  var c=cat.color,html='<div class="wlist">';
  cat.words.forEach(function(w){
    html+='<div class="witem" style="background:'+c+'08;border:1px solid '+c+'15">';
    html+='<div class="wleft">'+spkBtn(w.t,c,false);
    html+='<span class="wthai thai">'+w.t+'</span><span class="wphon">'+w.p+'</span></div>';
    html+='<span class="wheb">'+w.h+'</span></div>';
  });
  return html+'</div>';
}

function renderFlash(cat){
  var c=cat.color,cards=S.fc;
  if(!cards.length||S.fi>=cards.length) return '<div style="text-align:center;color:#888;padding:40px">סיימת! 🎉<br><br><button class="tab" data-mode="list" style="background:'+c+'22;color:'+c+'">חזרה לרשימה</button></div>';
  var w=cards[S.fi],fl=S.flip;
  var html='<div class="fc"><div class="fc-count">'+(S.fi+1)+'/'+cards.length+'</div>';
  html+='<div class="fc-card" id="flipCard" style="background:'+(fl?'linear-gradient(145deg,'+c+'15,'+c+'08)':'linear-gradient(145deg,#1a1a2e,#16213e)')+';border:2px solid '+(fl?c+'44':'#ffffff15')+'">';
  if(!fl){
    html+='<div class="fc-thai thai">'+w.t+'</div>';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-top:14px">'+spkBtn(w.t,c,true)+'<span class="fc-hint">לחץ לגלות</span></div>';
  }else{
    html+='<div style="display:flex;align-items:center;gap:8px">'+' <span class="thai" style="font-size:28px;font-weight:700">'+w.t+'</span>'+spkBtn(w.t,c,true)+'</div>';
    html+='<div class="fc-phon" style="color:'+c+'">'+w.p+'</div>';
    html+='<div class="fc-heb">'+w.h+'</div>';
  }
  html+='</div>';
  if(fl) html+='<div class="fc-btns"><button class="fc-btn no" id="fcNo">עוד לא 🤔</button><button class="fc-btn yes" id="fcYes">יודע ✅</button></div>';
  return html+'</div>';
}

function renderQuiz(cat){
  var c=cat.color,qs=S.qq;
  if(!qs.length) return '';
  if(S.qd){
    var pct=Math.round(S.qs/qs.length*100);
    var emo=pct>=80?'🎉':pct>=50?'💪':'📚';
    var msg=pct>=80?'מצוין!':pct>=50?'לא רע!':'תמשיך ללמוד!';
    return '<div class="q-result"><div class="q-result-emoji">'+emo+'</div><div class="q-result-score">'+S.qs+'/'+qs.length+'</div><div class="q-result-msg">'+msg+'</div><br><button class="tab" data-mode="list" style="background:'+c+'22;color:'+c+'">חזרה</button></div>';
  }
  var q=qs[S.qi],sel=S.qa;
  var html='<div class="quiz">';
  html+='<div class="q-dots">';
  qs.forEach(function(_,i){html+='<div class="q-dot" style="background:'+(i<S.qi?c:i===S.qi?'#fff':'#ffffff22')+'"></div>';});
  html+='</div>';
  html+='<div class="q-prompt">מה התרגום של:</div>';
  html+='<div style="display:flex;align-items:center;gap:8px"><span class="q-thai thai">'+q.w.t+'</span>'+spkBtn(q.w.t,c,true)+'</div>';
  html+='<div class="q-phon">'+q.w.p+'</div>';
  html+='<div class="q-opts">';
  q.opts.forEach(function(o){
    var bg=c+'11',bd=c+'33';
    if(sel!==null){
      if(o.t===q.w.t){bg='#51cf6633';bd='#51cf66';}
      else if(o.t===sel){bg='#ff4d4d33';bd='#ff4d4d';}
    }
    html+='<div class="q-opt" data-ans="'+o.t+'" style="background:'+bg+';border-color:'+bd+'">'+o.h+'</div>';
  });
  return html+'</div></div>';
}

// ===== EVENTS =====
function bindAll(){
  // Categories
  document.querySelectorAll('[data-ci]').forEach(function(el){
    el.onclick=function(){S.catIdx=+el.dataset.ci;S.screen='inner';S.mode='list';render();};
  });
  // Back
  var bb=document.getElementById('goBack');
  if(bb)bb.onclick=function(){S.screen='home';render();};
  // Tabs
  document.querySelectorAll('[data-mode]').forEach(function(el){
    el.onclick=function(){
      var m=el.dataset.mode;S.mode=m;
      var cat=DATA[S.catIdx];
      if(m==='flash'){S.fc=shuffle(cat.words);S.fi=0;S.flip=false;}
      if(m==='quiz'){
        var sh=shuffle(cat.words).slice(0,Math.min(8,cat.words.length));
        S.qq=sh.map(function(w){return{w:w,opts:shuffle([w].concat(shuffle(cat.words.filter(function(x){return x.t!==w.t;})).slice(0,3)))};});
        S.qi=0;S.qa=null;S.qs=0;S.qd=false;
      }
      render();
    };
  });
  // Speakers
  document.querySelectorAll('.spk[data-th]').forEach(function(el){
    el.onclick=function(e){e.stopPropagation();speak(el.dataset.th);};
  });
  // Flash flip
  var fc=document.getElementById('flipCard');
  if(fc)fc.onclick=function(){S.flip=!S.flip;render();};
  // Flash buttons
  var fy=document.getElementById('fcYes'),fn=document.getElementById('fcNo');
  if(fy)fy.onclick=function(){var cat=DATA[S.catIdx];S.known[kKey(cat,S.fc[S.fi])]=true;S.fi++;S.flip=false;render();};
  if(fn)fn.onclick=function(){var cat=DATA[S.catIdx];delete S.known[kKey(cat,S.fc[S.fi])];S.fi++;S.flip=false;render();};
  // Quiz
  document.querySelectorAll('[data-ans]').forEach(function(el){
    el.onclick=function(){
      if(S.qa!==null)return;
      S.qa=el.dataset.ans;
      if(S.qa===S.qq[S.qi].w.t)S.qs++;
      render();
      setTimeout(function(){
        if(S.qi+1>=S.qq.length)S.qd=true;
        else{S.qi++;S.qa=null;}
        render();
      },1000);
    };
  });
}

// ===== START =====
render();
</script>
</body>
</html>
